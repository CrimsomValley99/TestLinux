name: Kali WebTop Direct + Debug Logs

on:
  workflow_dispatch:

jobs:
  run-kali-direct:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: 1. Deploy Kali Linux Container
        run: |
          echo "=== PULL & RUN KALI ==="
          docker pull kalilinux/kali-rolling
          docker run -d \
            --name kali-gui \
            --security-opt seccomp=unconfined \
            --shm-size=4gb \
            --privileged \
            kalilinux/kali-rolling \
            /bin/bash -c "sleep infinity"
          sleep 3
          docker ps
          echo "=== DEPLOY OK ==="

      - name: 2. Install Full Kali Tools + Desktop + VNC
        run: |
          echo "=== INSTALL FULL KALI + DESKTOP + VNC ==="
          docker exec -u root kali-gui bash -c "
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq 2>&1 | tail -2

            echo '--- Install tools Kali lengkap ---'
            apt-get install -y \
              kali-linux-default \
              kali-desktop-xfce \
              xfce4-goodies \
              xfce4-terminal \
              x11vnc \
              xvfb \
              novnc \
              websockify \
              dbus \
              dbus-x11 \
              x11-xserver-utils \
              xfonts-base \
              net-tools \
              iproute2 \
              gnupg \
              gnupg2 \
              wget \
              curl \
              procps 2>&1 | tail -10

            echo 'INSTALL DONE'
            echo ''
            echo '--- Verifikasi tools Kali ---'
            which nmap && nmap --version | head -1 || echo 'nmap: not found'
            which metasploit || which msfconsole && echo 'metasploit: OK' || echo 'metasploit: not in PATH'
            which wireshark && wireshark --version | head -1 || echo 'wireshark: not found'
          "
          echo "=== PACKAGES OK ==="

      - name: 3. Install Chrome & AnyDesk (fix gnupg)
        run: |
          echo "=== INSTALL CHROME ==="
          docker exec -u root kali-gui bash -c "
            wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb -O /tmp/chrome.deb
            DEBIAN_FRONTEND=noninteractive apt-get install -y /tmp/chrome.deb 2>&1 | tail -3
            google-chrome --version && echo 'Chrome OK'
          "

          echo "=== INSTALL ANYDESK (dengan gnupg fix) ==="
          docker exec -u root kali-gui bash -c "
            mkdir -p /etc/apt/keyrings
            # FIX: gnupg sudah diinstall di step sebelumnya
            curl -fsSL https://keys.anydesk.com/repos/DEB-GPG-KEY | gpg --dearmor -o /etc/apt/keyrings/anydesk.gpg
            chmod 644 /etc/apt/keyrings/anydesk.gpg
            echo 'deb [signed-by=/etc/apt/keyrings/anydesk.gpg] http://deb.anydesk.com/ all main' > /etc/apt/sources.list.d/anydesk.list
            apt-get update -qq 2>&1 | grep -v 'WARNING\|Hit\|Get' || true
            DEBIAN_FRONTEND=noninteractive apt-get install -y anydesk 2>&1 | tail -5
            anydesk --version && echo 'AnyDesk OK' || echo 'AnyDesk install failed'
          " || echo "AnyDesk optional - skipping"

      - name: 4. Start Xvfb + XFCE + x11vnc + noVNC (dengan health check)
        run: |
          echo "=== [1/4] START XVFB ==="
          docker exec -u root kali-gui bash -c "
            rm -f /tmp/.X1-lock /tmp/.X11-unix/X1 2>/dev/null || true
            rm -rf /root/.cache/sessions/ 2>/dev/null || true
          "
          docker exec -d -u root kali-gui bash -c "
            Xvfb :1 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset
          "
          sleep 4
          docker exec -u root kali-gui bash -c "
            ps aux | grep -c '[X]vfb' && echo 'Xvfb: RUNNING ✅' || echo 'Xvfb: NOT RUNNING ❌'
          "

          echo "=== [2/4] START XFCE4 via dbus-run-session ==="
          docker exec -d -u root kali-gui bash -c "
            export DISPLAY=:1
            export HOME=/root
            rm -f /root/.config/xfce4/xfconf/xfce-perchannel-xml/displays.xml 2>/dev/null || true
            dbus-run-session -- startxfce4 > /tmp/xfce4.log 2>&1
          "
          sleep 15
          docker exec -u root kali-gui bash -c "
            echo '--- Proses XFCE aktif ---'
            ps aux | grep -E '(xfce|xfwm|xfdesktop|xfce4-panel|dbus)' | grep -v grep | head -10
            echo '--- Log XFCE (5 baris terakhir) ---'
            cat /tmp/xfce4.log 2>/dev/null | tail -5 || echo 'Log kosong'
          "

          echo "=== [3/4] START X11VNC ==="
          docker exec -d -u root kali-gui bash -c "
            x11vnc \
              -display :1 \
              -passwd password123 \
              -forever \
              -shared \
              -rfbport 5900 \
              -o /tmp/x11vnc.log \
              -bg \
              -xkb 2>&1
          "
          sleep 5
          docker exec -u root kali-gui bash -c "
            netstat -tlnp 2>/dev/null | grep 5900 && echo 'x11vnc port 5900: LISTEN ✅' || echo 'x11vnc port 5900: NOT OPEN ❌'
            cat /tmp/x11vnc.log 2>/dev/null | tail -5
          " || true

          echo "=== [4/4] START NOVNC WEBSOCKIFY ==="
          docker exec -d -u root kali-gui bash -c "
            websockify \
              --web=/usr/share/novnc/ \
              --log-file=/tmp/websockify.log \
              6080 localhost:5900
          "
          sleep 5
          docker exec -u root kali-gui bash -c "
            netstat -tlnp 2>/dev/null | grep 6080 && echo 'noVNC port 6080: LISTEN ✅' || echo 'noVNC port 6080: NOT OPEN ❌'
            cat /tmp/websockify.log 2>/dev/null | tail -5
          " || true

          echo "=== STATUS FINAL SEMUA PROSES ==="
          docker exec -u root kali-gui bash -c "
            echo '--- Proses aktif ---'
            ps aux | grep -E '(Xvfb|xfce|xfwm4|xfdesktop|xfce4-panel|x11vnc|websockify)' | grep -v grep
            echo '--- Port listen ---'
            netstat -tlnp 2>/dev/null | grep -E '(5900|6080)' || true
            echo '--- Kali Linux version ---'
            cat /etc/os-release | grep -E '(NAME|VERSION)'
          " || true

      - name: 5. Cloudflare Tunnel + Tampilkan Link
        run: |
          echo "=== CLOUDFLARE TUNNEL ==="
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

          CONTAINER_IP=$(docker inspect kali-gui --format='{{.NetworkSettings.IPAddress}}')
          echo "Container IP: $CONTAINER_IP"

          # Test aksesibilitas port 6080
          curl -s --max-time 5 http://${CONTAINER_IP}:6080 > /dev/null && \
            echo "Port 6080: ACCESSIBLE ✅" || \
            echo "Port 6080: tidak bisa diakses dari host, cek container"

          # Buka tunnel ke container IP
          cloudflared tunnel --url http://${CONTAINER_IP}:6080 > /tmp/cloudflared.log 2>&1 &

          echo "Menunggu tunnel stabil (30 detik)..."
          sleep 30

          echo "=========================================="
          echo "LOG CLOUDFLARE:"
          cat /tmp/cloudflared.log
          echo "=========================================="

          LINK=$(grep -o 'https://[-0-9a-z]*\.trycloudflare\.com' /tmp/cloudflared.log | head -1)

          echo ""
          echo "=========================================="
          echo "  LINK AKSES KALI LINUX FULL:"
          echo "  ${LINK}/vnc.html"
          echo ""
          echo "  Password VNC: password123"
          echo "  OS: Kali Linux (kali-rolling)"
          echo "  Tools: kali-linux-default (nmap, wireshark, dll)"
          echo "=========================================="

          # Cetak ulang link tiap 5 menit agar mudah dilihat di log
          for i in $(seq 1 72); do
            sleep 300
            echo "[$(date '+%H:%M')] LINK AKTIF: ${LINK}/vnc.html  |  Password: password123"
          done
