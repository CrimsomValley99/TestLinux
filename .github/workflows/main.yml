name: Kali WebTop Direct + Debug Logs

on:
  workflow_dispatch:

jobs:
  run-kali-direct:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: 1. Deploy Kali Linux Container
        run: |
          echo "=== PULL & RUN KALI ==="
          docker pull kalilinux/kali-rolling
          docker run -d \
            --name kali-gui \
            --security-opt seccomp=unconfined \
            --shm-size=4gb \
            --privileged \
            kalilinux/kali-rolling \
            /bin/bash -c "sleep infinity"
          sleep 3
          docker ps
          echo "=== DEPLOY OK ==="

      - name: 2. Install Xvfb + x11vnc + noVNC + XFCE + dbus
        run: |
          echo "=== INSTALL PACKAGES ==="
          docker exec -u root kali-gui bash -c "
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq 2>&1 | tail -2
            apt-get install -y --no-install-recommends \
              xfce4 \
              xfce4-goodies \
              xfce4-terminal \
              x11vnc \
              xvfb \
              novnc \
              websockify \
              dbus \
              dbus-x11 \
              x11-xserver-utils \
              xfonts-base \
              wget curl net-tools procps 2>&1 | tail -5
            echo 'INSTALL DONE'
          "
          echo "=== PACKAGES OK ==="

      - name: 3. Install Chrome & AnyDesk
        run: |
          echo "=== INSTALL CHROME ==="
          docker exec -u root kali-gui bash -c "
            wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb -O /tmp/chrome.deb
            DEBIAN_FRONTEND=noninteractive apt-get install -y /tmp/chrome.deb 2>&1 | tail -3
            google-chrome --version && echo 'Chrome OK' || echo 'Chrome not found'
          "
          echo "=== INSTALL ANYDESK ==="
          docker exec -u root kali-gui bash -c "
            mkdir -p /etc/apt/keyrings
            curl -fsSL https://keys.anydesk.com/repos/DEB-GPG-KEY | gpg --dearmor -o /etc/apt/keyrings/anydesk.gpg
            echo 'deb [signed-by=/etc/apt/keyrings/anydesk.gpg] http://deb.anydesk.com/ all main' > /etc/apt/sources.list.d/anydesk.list
            apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y anydesk 2>&1 | tail -3
            echo 'AnyDesk OK'
          " || echo "AnyDesk optional, skipping..."

      - name: 4. Start Xvfb + XFCE (dbus-run-session) + x11vnc + noVNC
        run: |
          echo "=== [1/4] START XVFB ==="
          # Bersihkan lock file lama dulu
          docker exec -u root kali-gui bash -c "
            rm -f /tmp/.X1-lock /tmp/.X11-unix/X1 2>/dev/null || true
            rm -rf /root/.cache/sessions/ 2>/dev/null || true
          "
          docker exec -d -u root kali-gui bash -c "
            Xvfb :1 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset &
          "
          sleep 4
          docker exec -u root kali-gui bash -c "
            ps aux | grep -c '[X]vfb' && echo 'Xvfb: RUNNING' || echo 'Xvfb: NOT RUNNING'
          "

          echo "=== [2/4] START XFCE4 VIA dbus-run-session ==="
          # FIX UTAMA: dbus-run-session memastikan D-Bus session ada
          # Tanpa ini: xfce4-panel, xfdesktop, xfwm4 tidak bisa load -> hanya cursor saja
          docker exec -d -u root kali-gui bash -c "
            export DISPLAY=:1
            export HOME=/root
            # Hapus session config lama yang bisa menyebabkan crash
            rm -f /root/.config/xfce4/xfconf/xfce-perchannel-xml/displays.xml 2>/dev/null || true
            # dbus-run-session: start D-Bus session bus, lalu jalankan XFCE di dalamnya
            dbus-run-session -- startxfce4 > /tmp/xfce4.log 2>&1 &
          "
          sleep 12
          docker exec -u root kali-gui bash -c "
            echo '--- Proses XFCE yang berjalan ---'
            ps aux | grep -E '(xfce|xfwm|xfdesktop|xfce4-panel|dbus)' | grep -v grep | head -15
            echo '--- Log XFCE (5 baris terakhir) ---'
            tail -5 /tmp/xfce4.log 2>/dev/null || echo 'Log kosong'
          "

          echo "=== [3/4] START X11VNC ==="
          docker exec -d -u root kali-gui bash -c "
            x11vnc \
              -display :1 \
              -passwd password123 \
              -forever \
              -shared \
              -rfbport 5900 \
              -o /tmp/x11vnc.log \
              -bg \
              -xkb 2>&1
          "
          sleep 4
          docker exec -u root kali-gui bash -c "
            ss -tlnp | grep 5900 && echo 'x11vnc port 5900: LISTEN' || echo 'x11vnc: PORT NOT OPEN!'
            tail -5 /tmp/x11vnc.log 2>/dev/null
          "

          echo "=== [4/4] START NOVNC WEBSOCKIFY ==="
          docker exec -d -u root kali-gui bash -c "
            websockify \
              --web=/usr/share/novnc/ \
              --log-file=/tmp/websockify.log \
              6080 localhost:5900 &
          "
          sleep 4
          docker exec -u root kali-gui bash -c "
            ss -tlnp | grep 6080 && echo 'noVNC port 6080: LISTEN' || echo 'noVNC: PORT NOT OPEN!'
            tail -5 /tmp/websockify.log 2>/dev/null
          "

          echo "=== STATUS LENGKAP ==="
          docker exec -u root kali-gui bash -c "
            echo '--- Semua proses aktif ---'
            ps aux | grep -E '(Xvfb|xfce|xfwm4|xfdesktop|xfce4-panel|x11vnc|websockify)' | grep -v grep
            echo ''
            echo '--- Port yang listen ---'
            ss -tlnp | grep -E '(5900|6080)'
          "

      - name: 5. Cloudflare Tunnel + Tampilkan Link Akses
        run: |
          echo "=== SETUP CLOUDFLARE TUNNEL ==="
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

          CONTAINER_IP=$(docker inspect kali-gui --format='{{.NetworkSettings.IPAddress}}')
          echo "Container IP: $CONTAINER_IP"

          # Verifikasi port 6080 bisa diakses dari host
          curl -s --max-time 5 http://${CONTAINER_IP}:6080 > /dev/null && \
            echo "Port 6080 dari host: OK" || \
            echo "Port 6080 dari host: TIDAK BISA DIAKSES"

          cloudflared tunnel --url http://${CONTAINER_IP}:6080 > /tmp/cloudflared.log 2>&1 &

          echo "Menunggu tunnel stabil (25 detik)..."
          sleep 25

          echo "=========================================="
          echo "LOG CLOUDFLARE:"
          cat /tmp/cloudflared.log
          echo "=========================================="

          LINK=$(grep -o 'https://[-0-9a-z]*\.trycloudflare\.com' /tmp/cloudflared.log | head -1)
          echo ""
          echo "=========================================="
          echo "LINK AKSES KALI LINUX GUI:"
          echo "${LINK}/vnc.html"
          echo ""
          echo "Password VNC: password123"
          echo "=========================================="

          for i in $(seq 1 72); do
            sleep 300
            echo "[$(date)] Session aktif - Link: ${LINK}/vnc.html"
          done
