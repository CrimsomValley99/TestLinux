name: Kali WebTop Direct + Debug Logs

on:
  workflow_dispatch:

jobs:
  run-kali-direct:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Deploy Image Kali WebTop (Tanpa Build)
        run: |
          echo "Menarik dan menjalankan image LinuxServer WebTop Kali..."
          docker run -d \
            --name kali-gui \
            --security-opt seccomp=unconfined \
            --shm-size=4gb \
            -p 3000:3000 \
            -e PUID=1000 \
            -e PGID=1000 \
            -e TZ=Asia/Jakarta \
            lscr.io/linuxserver/webtop:kali
          
          echo "Menunggu 20 detik agar antarmuka GUI siap..."
          sleep 20
          
          echo "=========================================================="
          echo "LOG DOCKER (DEBUGGING GUI KALI):"
          docker logs kali-gui
          echo "=========================================================="

      - name: 2. Install Chrome & AnyDesk (Mode Admin)
        run: |
          echo "Menginstal aplikasi tambahan..."
          # WebTop menggunakan user 'abc' atau 'root', kita paksa pakai root
          docker exec -u root kali-gui apt-get update -y
          docker exec -u root kali-gui apt-get install -y wget curl gnupg2
          
          echo "Mengunduh Chrome..."
          docker exec -u root kali-gui bash -c "wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb"
          docker exec -u root kali-gui bash -c "apt-get install -y ./google-chrome-stable_current_amd64.deb"
          
          echo "Mengunduh AnyDesk..."
          docker exec -u root kali-gui bash -c "mkdir -p /etc/apt/keyrings"
          docker exec -u root kali-gui bash -c "curl -fsSL https://keys.anydesk.com/repos/DEB-GPG-KEY | gpg --dearmor -o /etc/apt/keyrings/anydesk.gpg"
          docker exec -u root kali-gui bash -c 'echo "deb [signed-by=/etc/apt/keyrings/anydesk.gpg] http://deb.anydesk.com/ all main" > /etc/apt/sources.list.d/anydesk.list'
          docker exec -u root kali-gui bash -c "apt-get update -y && apt-get install -y anydesk"

      - name: 3. Start Cloudflare Tunnel & Debug
        run: |
          echo "Menyiapkan Cloudflare Tunnel..."
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          
          # WebTop berjalan di port 3000 menggunakan HTTP
          cloudflared tunnel --url http://127.0.0.1:3000 > cloudflared.log 2>&1 &
          
          echo "Menunggu Cloudflare stabil (15 detik)..."
          sleep 15
          
          echo "=========================================================="
          echo "LOG CLOUDFLARE (DEBUGGING KONEKSI):"
          cat cloudflared.log
          echo "=========================================================="
          
          echo "TAUTAN AKSES KAMU:"
          grep -o 'https://[-0-9a-z]*\.trycloudflare\.com' cloudflared.log
          echo "=========================================================="
          echo "PENTING: CUKUP KLIK LINK DI ATAS!"
          echo "Kamu TIDAK PERLU menambahkan /vnc.html lagi."
          
          sleep 3600
