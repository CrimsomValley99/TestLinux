name: Run Kali GUI with Cloudflare Tunnel

on:
  workflow_dispatch:

jobs:
  run-kali-cf:
    runs-on: ubuntu-latest
    steps:
      - name: Jalankan Kali Docker
        run: |
          # Jalankan container
          docker run -d --name kali-gui -p 8080:8080 iphoneintosh/kali-docker:latest
          
          # Beri waktu lebih lama agar desktop, VNC, dan sertifikat SSL siap sepenuhnya
          echo "Menunggu Kali Linux GUI siap (30 detik)..."
          sleep 30
          
          # Cek log docker untuk memastikan tidak ada error saat booting
          docker logs kali-gui

      - name: Install Cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Start Cloudflare Tunnel
        run: |
          # Menggunakan 127.0.0.1 alih-alih localhost untuk menghindari isu IPv6
          # Mengabaikan TLS verify karena pakai self-signed cert
          cloudflared tunnel --url http://127.0.0.1:8080 --no-tls-verify > cloudflared.log 2>&1 &
          
          sleep 10
          
          echo "=========================================================="
          echo "Tautan Cloudflare Tunnel Kamu:"
          grep -o 'https://[-0-9a-z]*\.trycloudflare\.com' cloudflared.log
          echo "=========================================================="
          echo "PENTING: Tambahkan /vnc.html di akhir URL saat dibuka di browser!"
          echo "Contoh: https://link-kamu.trycloudflare.com/vnc.html"
          echo "Password VNC: changeme"
          
          sleep 3600
